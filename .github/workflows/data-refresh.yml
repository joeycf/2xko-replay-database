name: Daily data refresh

on:
  # TEMPORARILY DISABLED while the bestReplays channel is being prepared locally.
  # A scheduled run would refresh + commit the current 2-channel data on main,
  # diverging it from the in-progress 3-channel work and forcing a merge/reconcile
  # at push time. Restore this schedule in the commit that lands the new channel.
  # schedule:
  #   # 06:17 UTC daily (odd minute to dodge cron rush)
  #   - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # matches engines.node (the platform's Node policy — STACK.md §1)
          node-version: 24
          cache: npm

      - run: npm ci

      # fetch + parse (champion art is NOT part of the daily run —
      # scripts/champions.ts only runs when the roster changes)
      - name: Rebuild data
        run: npm run data:build
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "2xko-data-refresh[bot]"
          git config user.email "data-refresh@users.noreply.github.com"
          # replays.json is the generic app artifact emitted alongside
          # videos.json (Phase 3) — both must land in the same commit or the
          # site's data desyncs from the pipeline substrate.
          git add data/videos.json data/replays.json data/stats.json data/players.json data/report.md
          # report.md's "_Generated <timestamp>_" line changes every run; a diff
          # that is ONLY that line is not a data change — drop it so a no-change
          # day produces no commit (and no deploy). report.md still ships
          # whenever anything real changes alongside it.
          REAL=$(git diff --cached -- data/report.md | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' | { grep -vc '^[+-]_Generated ' || true; })
          if [ "$REAL" -eq 0 ]; then
            git restore --staged --worktree data/report.md
          fi
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          N=$(node -p "require('./data/videos.json').length")
          git commit -m "data: refresh $(date -u +%F) — ${N} videos"
          git push
